<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgePoint - Link Page</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --rainbow-1: #ff0000;
      --rainbow-2: #ff8800;
      --rainbow-3: #ffdd00;
      --rainbow-4: #00cc44;
      --rainbow-5: #0088ff;
      --rainbow-6: #6600cc;
      --rainbow-7: #cc00ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── 데스크탑: 폰 프레임 ── */
    body {
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111118;
      overflow-x: hidden;
    }

    .phone-frame {
      position: relative;
      width: 390px;
      height: 844px;
      border-radius: 48px;
      overflow: hidden;
      box-shadow:
        0 0 0 12px #1a1a2e,
        0 0 0 14px rgba(255, 255, 255, 0.08),
        0 30px 80px rgba(0, 0, 0, 0.6);
      background: #0a0a14;
    }

    .phone-inner {
      position: relative;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .phone-inner::-webkit-scrollbar {
      display: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 노치 */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 28px;
      background: #1a1a2e;
      border-radius: 0 0 18px 18px;
      z-index: 10;
    }

    /* 모바일에서는 프레임 제거, 풀스크린 */
    @media (max-width: 430px) {
      body {
        background: #0a0a14;
        align-items: flex-start;
      }
      .phone-frame {
        width: 100%;
        height: auto;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
      .phone-frame::before {
        display: none;
      }
    }

    /* ── Top Banner (별자리 이미지) ── */
    .hero-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 340px;
      background-color: #0a0a14;
      background-image: url('banner-stars-4k.jpg');
      background-size: 130% auto;
      background-position: center 3%;
      background-repeat: no-repeat;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: high-quality;
      z-index: 0;
    }
    .hero-img::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%;
      background: linear-gradient(to bottom, transparent, #0a0a14);
      pointer-events: none;
    }

    /* ── Main Content ── */
    .main-content {
      position: relative;
      margin-top: 210px;
      width: 100%;
      padding: 0 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    /* ── Avatar (EDGEPOINT 로고) ── */
    .avatar-container {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      padding: 2px;
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #0a0a14;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 60%;
    }

    /* ── Typography ── */
    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #ff6b6b, #ffa944, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 3s ease infinite;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 200% center; }
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 32px;
    }

    /* ── Link Buttons ── */
    .btn-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #ffffff;
      text-decoration: none;
      padding: 16px 20px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.4s ease;
      overflow: hidden;
      cursor: pointer;
    }

    /* 무지개 글로우 효과 (호버) */
    .link-btn::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 16px;
      background: conic-gradient(
        from var(--angle, 0deg),
        var(--rainbow-1), var(--rainbow-2), var(--rainbow-3),
        var(--rainbow-4), var(--rainbow-5), var(--rainbow-6),
        var(--rainbow-7), var(--rainbow-1)
      );
      opacity: 0;
      z-index: -2;
      transition: opacity 0.4s ease;
      animation: rotate-border 3s linear infinite;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 13px;
      background: rgba(10, 10, 20, 0.92);
      z-index: -1;
      transition: background 0.4s ease;
    }

    .link-btn:hover::before {
      opacity: 1;
    }

    .link-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 0 20px rgba(255, 100, 100, 0.15),
        0 0 40px rgba(100, 100, 255, 0.1);
      border-color: transparent;
    }

    .link-btn:hover::after {
      background: rgba(10, 10, 20, 0.85);
    }

    /* 링크 없는 버튼 스타일 */
    .link-btn.coming-soon {
      cursor: default;
    }

    .link-btn.coming-soon .badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
    }

    /* 아이콘 */
    .link-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── CSS Houdini for --angle (fallback included) ── */
    @supports (background: paint(something)) {
      @property --angle {
        syntax: '<angle>';
        initial-value: 0deg;
        inherits: false;
      }
    }

    @keyframes rotate-border {
      to { --angle: 360deg; }
    }

    /* Fallback: hue-rotate 무지개 효과 */
    @supports not (background: paint(something)) {
      .link-btn:hover::before {
        animation: hue-spin 2s linear infinite;
      }
      @keyframes hue-spin {
        to { filter: hue-rotate(360deg); }
      }
    }

    /* ── Bottom Background (은하수) ── */
    .bottom-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background-image: url('bg-galaxy-4k.jpg');
      background-size: 220% auto;
      background-position: center center;
      background-repeat: no-repeat;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: high-quality;
      z-index: 0;
      pointer-events: none;
    }
    .bottom-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(to top, transparent, #0a0a14);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      z-index: 1;
    }

    .footer strong {
      display: block;
      margin-top: 4px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <!-- Phone Frame -->
  <div class="phone-frame">
    <div class="phone-inner">

      <!-- Top Banner (별자리) -->
      <div class="hero-img"></div>

      <!-- Bottom Background (은하수) -->
      <div class="bottom-bg"></div>

      <!-- Main Content -->
      <div class="main-content">

        <!-- Avatar (EDGEPOINT 로고) -->
        <div class="avatar-container">
          <div class="avatar-inner">
            <img class="avatar" src="edgepoint-logo-dark.png" alt="EdgePoint" />
          </div>
        </div>

        <!-- Link Buttons -->
        <div class="btn-container">

          <!-- 1. X (Twitter) -->

          <!-- 4. RainbowMoon Project (Coming Soon) -->
          <div class="link-btn coming-soon">

            <span class="badge">Coming Soon</span>
          </div>

        </div>

        <!-- Footer -->
        <div class="footer">
          <h1>R. EdgePoint</h1>
          <p class="subtitle">Link · Amplify · Elevate</p>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
